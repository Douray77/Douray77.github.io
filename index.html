<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>人人都是质量官 · 工业赛博</title>
    <!-- Supabase客户端库 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 此处保留您之前的所有样式，为节省篇幅，实际使用时应包含完整样式，此处省略 */
        /* 注：样式部分与上一次提供的完整代码完全相同，可复用 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Share Tech Mono', 'Courier New', 'Poppins', monospace;
        }
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Poppins:wght@400;600;800&display=swap');

        body {
            min-height: 100vh;
            background: #0c0c0c;
            background-image: 
                linear-gradient(0deg, rgba(255, 140, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 140, 0, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle, rgba(255, 100, 0, 0.3) 0%, transparent 70%);
            filter: blur(60px);
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            right: -20%;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle, rgba(255, 200, 0, 0.3) 0%, transparent 70%);
            filter: blur(60px);
            z-index: 0;
        }

        .game-container {
            max-width: 500px;
            width: 100%;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid #FF8F00;
            border-radius: 30px;
            padding: 20px 16px 28px;
            box-shadow: 0 0 30px #FF8F00, inset 0 0 10px rgba(255, 140, 0, 0.3);
            position: relative;
            z-index: 10;
        }

        .game-container::before,
        .game-container::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid #FFD700;
            filter: drop-shadow(0 0 8px gold);
        }
        .game-container::before {
            top: 10px;
            left: 10px;
            border-right: none;
            border-bottom: none;
        }
        .game-container::after {
            bottom: 10px;
            right: 10px;
            border-left: none;
            border-top: none;
        }

        .global-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            color: #FFD700;
            text-shadow: 0 0 10px #FF8F00, 0 0 20px #E65100;
            letter-spacing: 4px;
            margin-bottom: 4px;
            word-break: keep-all;
            line-height: 1.2;
            cursor: pointer;
            user-select: none;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
        }

        .sub-title {
            text-align: center;
            font-size: 0.9rem;
            color: #FFE0B0;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .game-stats {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            margin-bottom: 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            color: #FFD700;
            font-size: 1rem;
            border: 1px solid #FF8F00;
        }

        .info-section {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #FF8F00;
            border-radius: 20px;
            padding: 18px 20px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(255, 140, 0, 0.2), 0 4px 10px rgba(0,0,0,0.5);
        }
        .input-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }
        .input-row:last-child { margin-bottom: 0; }
        .input-icon {
            min-width: 40px;
            text-align: center;
            color: #FFD700;
            font-size: 1.6rem;
            filter: drop-shadow(0 0 8px #FF8F00);
        }
        .input-field {
            flex: 1;
            background: rgba(0,0,0,0.8);
            border: 1px solid #FF8F00;
            border-radius: 40px;
            padding: 10px 16px;
            transition: 0.2s;
        }
        .input-field:focus-within {
            border-color: #FFD700;
            box-shadow: 0 0 15px #FF8F00;
        }
        .input-field input {
            width: 100%;
            background: transparent;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            color: #FFE0B0;
            outline: none;
            font-family: 'Share Tech Mono', monospace;
        }
        .input-field input::placeholder {
            color: #7A5A3A;
            font-weight: 400;
        }

        .rank-info {
            display: flex;
            justify-content: space-between;
            margin: 16px 0 8px;
            padding: 10px 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #FF8F00;
            border-radius: 20px;
            color: #FFE0B0;
            font-size: 0.9rem;
        }
        .rank-info span {
            color: #FFD700;
            font-weight: 700;
        }

        .redline-header {
            font-size: 1.2rem;
            font-weight: 700;
            color: #FFD700;
            margin: 20px 0 10px;
            text-align: center;
            text-shadow: 0 0 8px #FF8F00;
        }

        .redline-list {
            list-style: none;
            margin: 10px 0 20px;
            padding: 0;
        }
        .redline-item {
            display: flex;
            align-items: baseline;
            justify-content: center; /* 居中 */
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px dashed rgba(255, 140, 0, 0.3);
            color: #FFE0B0;
            font-size: 0.85rem;
            text-align: center;
        }
        .redline-item::before {
            content: '⚡';
            color: #FFD700;
            font-size: 1rem;
        }

        .main-panel {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #FF8F00;
            border-radius: 30px;
            padding: 24px 16px 28px;
            box-shadow: inset 0 0 20px rgba(255, 140, 0, 0.2);
            margin-top: 8px;
            min-height: 380px;
            transition: all 0.3s;
        }

        .scenario-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .scenario-header {
            display: flex;
            justify-content: flex-start;  /* 靠左对齐 */
            align-items: center;
            gap: 8px;                     /* 元素间距 */
            flex-wrap: wrap;
        }
        .level-badge {
            background: #FF8F00;
            color: black;
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 0 10px #FF8F00;
        }
        .level-role {
            font-size: 1.2rem;            /* 加大 */
            font-weight: 800;              /* 加粗 */
            color: #FFD700;                /* 金色 */
            text-shadow: 0 0 5px #FF8F00;  /* 增强光效 */
            white-space: nowrap;
        }

        .redline-commitment {
            background: rgba(0,0,0,0.6);
            border: 1px solid #FFD700;
            border-radius: 20px;
            padding: 16px;
            color: #FFE5C4;
            font-size: 1.1rem;
            line-height: 1.5;
            box-shadow: inset 0 0 10px rgba(255,215,0,0.2);
            margin-bottom: 8px;
        }
        .redline-commitment::before {
            content: '🔴 红线要求: ';
            color: #FFD700;
            font-weight: 700;
        }

        .scenario-box {
            background: rgba(0,0,0,0.7);
            border: 1px solid #FF8F00;
            border-radius: 30px;
            padding: 20px;
            box-shadow: inset 0 0 15px rgba(255,140,0,0.2);
        }
        .scenario-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #FFD700;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .scenario-label i {
            font-size: 1.2rem;
        }
        .scenario-text {
            color: #FFE5C4;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }
        .option-btn {
            background: rgba(0,0,0,0.8);
            border: 2px solid #FF8F00;
            border-radius: 40px;
            padding: 14px 18px;
            font-size: 1rem;
            font-weight: 500;
            color: #FFE0B0;
            text-align: left;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 0 8px rgba(255,140,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .option-btn:active {
            background: #FF8F00;
            color: black;
            border-color: #FFD700;
        }
        .option-btn.correct {
            background: #2E7D32;
            border-color: #FFD700;
            box-shadow: 0 0 20px #FFD700;
        }
        .option-btn.wrong {
            background: #B71C1C;
            border-color: #FF3D00;
            box-shadow: 0 0 20px #FF3D00;
        }
        .option-letter {
            width: 28px;
            height: 28px;
            background: #FF8F00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: black;
            flex-shrink: 0;
        }
        .feedback-message {
            background: rgba(0,0,0,0.8);
            border: 2px solid #FFD700;
            border-radius: 40px;
            padding: 16px;
            color: #FFE5C4;
            font-size: 1.1rem;
            text-align: center;
            box-shadow: 0 0 25px gold;
            white-space: pre-wrap;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .nav-btn {
            flex: 1;
            background: transparent;
            border: 2px solid #FF8F00;
            border-radius: 40px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 700;
            color: #FFE0B0;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 10px #FF8F00;
        }
        .nav-btn:active {
            background: #FF8F00;
            color: black;
        }
        .nav-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .action-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        .primary-btn, .secondary-btn {
            border: none;
            font-weight: 700;
            padding: 14px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s;
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-family: 'Share Tech Mono', monospace;
            border: 2px solid;
            background: transparent;
        }
        .primary-btn {
            border-color: #FF8F00;
            color: #FFD7B0;
            box-shadow: 0 0 15px #FF8F00;
        }
        .primary-btn:active {
            background: #FF8F00;
            color: black;
        }
        .secondary-btn {
            border-color: #FFD700;
            color: #FFE0B0;
            box-shadow: 0 0 15px gold;
        }
        .secondary-btn:active {
            background: #FFD700;
            color: black;
        }

        .success-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
            animation: popIn 0.4s ease;
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        .slogan-top {
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 900;
            color: #FFD700;
            text-align: center;
            line-height: 1.2;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #FF8F00, 0 0 40px #E65100;
        }
        .shield-image {
            width: 140px;
            height: auto;
            margin: 20px 0;
            filter: drop-shadow(0 0 25px gold);
        }
        .congrats-bottom {
            color: #FFE5C4;
            font-size: 1.2rem;
            font-weight: 600;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            padding: 14px 24px;
            border-radius: 60px;
            border: 2px solid #FFD700;
            margin-top: 20px;
            text-align: center;
            line-height: 1.4;
            box-shadow: 0 0 25px gold;
        }
        .success-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .success-actions button {
            flex: 1;
            padding: 14px;
            border: 2px solid;
            border-radius: 40px;
            background: transparent;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }
        .success-actions .achievement-btn {
            border-color: #FF8F00;
            color: #FFD7B0;
            box-shadow: 0 0 15px #FF8F00;
        }
        .success-actions .again-btn {
            border-color: #FFD700;
            color: #FFE0B0;
            box-shadow: 0 0 15px gold;
        }
        .success-actions button:active {
            background: currentColor;
            color: black;
        }

        .error-message {
            background: #B71C1C;
            color: #FFCDB2;
            padding: 18px;
            border-radius: 40px;
            text-align: center;
            font-weight: 700;
            font-size: 1.2rem;
            border: 2px solid #FF3D00;
            box-shadow: 0 0 25px #FF3D00;
        }

        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 16px;
        }
        .modal-content {
            background: rgba(5, 5, 8, 0.95);
            border: 3px solid #FF8F00;
            border-radius: 40px;
            padding: 24px 20px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 50px #FF8F00;
        }
        .modal-content h2 {
            color: #FFD7B0;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #FF8F00;
        }
        .record-list {
            background: rgba(0,0,0,0.5);
            border: 1px solid #FF8F00;
            border-radius: 30px;
            padding: 12px;
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        .record-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 14px;
            border-bottom: 1px solid #FF8F00;
            color: #FFE0B0;
            font-size: 0.9rem;
        }
        .record-item:last-child { border-bottom: none; }
        .record-item .dept-name {
            font-weight: 600;
        }
        .record-item .score-duration {
            color: #FFD700;
        }
        .modal-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .modal-btn {
            background: transparent;
            border: 2px solid #FFD700;
            color: #FFD7B0;
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s;
            font-size: 1rem;
            box-shadow: 0 0 15px gold;
        }
        .modal-btn:active {
            background: #FFD700;
            color: black;
        }
        .close-btn { border-color: #FF8F00; box-shadow: 0 0 15px #FF8F00; }
        .empty-message { color: #888; text-align: center; padding: 20px; font-style: italic; }
        .loading-message { color: #FFD700; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; background: repeating-linear-gradient(45deg, rgba(255,140,0,0.02) 0px, rgba(255,140,0,0.02) 10px, transparent 10px, transparent 20px);"></div>

    <div class="game-container" id="gameContainer">
        <div class="global-title" id="globalTitle">人人都是质量官</div>
        <div class="sub-title">质量红线闯关小游戏</div>

        <div class="game-stats" id="gameStats" style="display: none;">
            <span>得分: <span id="currentScore">0</span></span>
            <span>用时: <span id="currentTime">00:00</span></span>
        </div>

        <div class="info-section" id="infoSection">
            <div class="input-row">
                <span class="input-icon"><i class="fas fa-industry"></i></span>
                <div class="input-field"><input type="text" id="departmentInput" placeholder="部门" maxlength="50"></div>
            </div>
            <div class="input-row">
                <span class="input-icon"><i class="fas fa-user-cog"></i></span>
                <div class="input-field"><input type="text" id="playerName" placeholder="姓名" maxlength="20"></div>
            </div>
            <div class="input-row">
                <span class="input-icon"><i class="fas fa-id-card"></i></span>
                <div class="input-field"><input type="text" id="yamiAccount" placeholder="娅米账号" maxlength="30"></div>
            </div>
            <div class="rank-info" id="rankInfo">
                <span>当前排名：</span><span id="currentRank">--</span>
                <span>最好成绩：</span><span id="bestScore">--</span>
            </div>
        </div>

        <div class="main-panel" id="mainPanel"></div>

        <div class="action-bar" id="actionBar">
            <button class="primary-btn" id="startBtn">⚡ 开始挑战</button>
            <button class="secondary-btn" id="rankBtn">🏆 当前排行</button>
            <button class="secondary-btn" id="bestBtn">⭐ 我的最好成绩</button>
        </div>
    </div>

    <div id="adminModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>📋 质量卫士总榜</h2>
            <div id="recordList" class="record-list"><div class="loading-message">加载中...</div></div>
            <div class="modal-buttons">
                <button class="modal-btn" id="exportCSV">📥 导出CSV</button>
                <button class="modal-btn close-btn" id="closeModal">🔙 关闭</button>
            </div>
        </div>
    </div>

    <div id="myAchievementModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>🏅 我的成就</h2>
            <div id="myRecordList" class="record-list"><div class="loading-message">加载中...</div></div>
            <div class="modal-buttons">
                <button class="modal-btn close-btn" id="closeMyModal">🔙 关闭</button>
            </div>
        </div>
    </div>

                    ],
                    feedback: '✅ 正确！记录必须真实，特殊情况需备注。'
                },
                {
                    question: '你发现一个微小异常，但不影响最终产品，是否要上报？',
                    options: [
                        { text: '不上报，省事', correct: false },
                        { text: '立即上报并记录', correct: true },
                        { text: '观望一下再定', correct: false },
                        { text: '告诉同事不报', correct: false }
                    ],
                    feedback: '✅ 正确！任何异常都应第一时间上报，防止隐患。'
                },
                {
                    question: '点检时发现设备有异响，但还能运转，你应该？',
                    options: [
                        { text: '继续使用，问题不大', correct: false },
                        { text: '停止使用，报修并挂标识', correct: true },
                        { text: '等下班再说', correct: false },
                        { text: '自行修理', correct: false }
                    ],
                    feedback: '✅ 正确！带病设备必须停用报修。'
                },
                {
                    question: '有同事提出一个工艺改进想法，想直接在生产线上试试。你应该？',
                    options: [
                        { text: '支持他试试', correct: false },
                        { text: '要求先走变更评估流程', correct: true },
                        { text: '不关我事', correct: false },
                        { text: '让他找别人', correct: false }
                    ],
                    feedback: '✅ 正确！任何改变必须经过评估审批。'
                }
            ];

            function shuffleArray(arr) {
                const newArr = [...arr];
                for (let i = newArr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
                }
                return newArr;
            }

            function getRandomizedScenario(index) {
                const base = BASE_SCENARIOS[index];
                const shuffledOptions = shuffleArray([...base.options]);
                return {
                    question: base.question,
                    options: shuffledOptions,
                    feedback: base.feedback
                };
            }

            // 解析 desc，返回 [rolePart, descPart]
            function parseDesc(desc) {
                const parts = desc.split(':');
                return [parts[0], parts.slice(1).join(':')]; // 第一个冒号前为角色部分，后面为具体描述
            }

            // 状态
            let gameActive = false;
            let currentLevel = 0;
            let completed = new Array(ROLES.length).fill(false);
            let levelWrongCount = new Array(ROLES.length).fill(0); // 每个关卡已答错次数
            let currentScore = 0;
            let startTime = null;
            let timerInterval = null;
            let randomizedScenarios = [];

            // DOM
            const departmentInput = document.getElementById('departmentInput');
            const playerNameInput = document.getElementById('playerName');
            const yamiInput = document.getElementById('yamiAccount');
            const mainPanel = document.getElementById('mainPanel');
            const startBtn = document.getElementById('startBtn');
            const rankBtn = document.getElementById('rankBtn');
            const bestBtn = document.getElementById('bestBtn');
            const infoSection = document.getElementById('infoSection');
            const actionBar = document.getElementById('actionBar');
            const globalTitle = document.getElementById('globalTitle');
            const currentRankSpan = document.getElementById('currentRank');
            const bestScoreSpan = document.getElementById('bestScore');
            const gameStats = document.getElementById('gameStats');
            const currentScoreSpan = document.getElementById('currentScore');
            const currentTimeSpan = document.getElementById('currentTime');

            // 模态框
            const adminModal = document.getElementById('adminModal');
            const recordListDiv = document.getElementById('recordList');
            const exportBtn = document.getElementById('exportCSV');
            const closeModalBtn = document.getElementById('closeModal');
            const myModal = document.getElementById('myAchievementModal');
            const myRecordListDiv = document.getElementById('myRecordList');
            const closeMyModalBtn = document.getElementById('closeMyModal');

            function resetGame() {
                completed.fill(false);
                levelWrongCount.fill(0);
                currentLevel = 0;
                currentScore = 0;
                startTime = Date.now();
                randomizedScenarios = BASE_SCENARIOS.map((_, idx) => getRandomizedScenario(idx));
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(updateTimer, 1000);
                updateTimer();
            }

            function updateTimer() {
                if (!gameActive) return;
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
                const seconds = (elapsed % 60).toString().padStart(2, '0');
                currentTimeSpan.textContent = `${minutes}:${seconds}`;
                currentScoreSpan.textContent = currentScore;
            }

            function startChallenge() {
                const dept = departmentInput.value.trim();
                const name = playerNameInput.value.trim();
                const yami = yamiInput.value.trim();
                if (!dept) { alert('请填写部门'); return false; }
                if (!name) { alert('请填写姓名'); return false; }
                if (!yami) { alert('请填写娅米账号'); return false; }
                gameActive = true;
                resetGame();
                renderMainPanel();
                return true;
            }

            async function updateUserRankAndBest() {
                const dept = departmentInput.value.trim();
                const name = playerNameInput.value.trim();
                const yami = yamiInput.value.trim();
                if (!dept || !name || !yami || !supabaseClient) {
                    currentRankSpan.textContent = '--';
                    bestScoreSpan.textContent = '--';
                    return;
                }
                try {
                    const { data, error } = await supabaseClient
                        .from('guardians')
                        .select('*')
                        .order('duration', { ascending: true });
                    if (error) throw error;
                    
                    const userBestMap = new Map();
                    data.forEach(rec => {
                        const key = `${rec.department}|${rec.name}|${rec.yami}`;
                        if (!userBestMap.has(key) || rec.duration < userBestMap.get(key)) {
                            userBestMap.set(key, rec.duration);
                        }
                    });
                    
                    const bestRecords = Array.from(userBestMap.entries()).map(([key, duration]) => {
                        const [dept, name, yami] = key.split('|');
                        return { dept, name, yami, duration };
                    }).sort((a, b) => a.duration - b.duration);
                    
                    const currentKey = `${dept}|${name}|${yami}`;
                    const userDuration = userBestMap.get(currentKey);
                    if (userDuration === undefined) {
                        currentRankSpan.textContent = '无记录';
                        bestScoreSpan.textContent = '无';
                    } else {
                        let rank = 1;
                        for (let i = 0; i < bestRecords.length; i++) {
                            if (bestRecords[i].dept === dept && bestRecords[i].name === name && bestRecords[i].yami === yami) {
                                rank = i + 1;
                                break;
                            }
                        }
                        currentRankSpan.textContent = `第${rank}名`;
                        bestScoreSpan.textContent = `100分 (${userDuration}秒)`;
                    }
                } catch (e) {
                    console.error(e);
                    currentRankSpan.textContent = '--';
                    bestScoreSpan.textContent = '--';
                }
            }

            function renderMainPanel() {
                if (!gameActive) {
                    infoSection.style.display = 'block';
                    actionBar.style.display = 'flex';
                    gameStats.style.display = 'none';
                    updateUserRankAndBest();
                    mainPanel.innerHTML = `
                        <div class="redline-header">《质量红线十条》</div>
                        <ul class="redline-list">
                            ${ROLES.map(r => `<li class="redline-item">${r.desc}</li>`).join('')}
                        </ul>
                    `;
                } else if (completed.every(v => v === true)) {
                    infoSection.style.display = 'none';
                    actionBar.style.display = 'none';
                    gameStats.style.display = 'none';
                    renderSuccessScreen();
                } else {
                    infoSection.style.display = 'none';
                    actionBar.style.display = 'none';
                    gameStats.style.display = 'flex';
                    renderLevel(currentLevel);
                }
            }

            function renderLevel(level) {
                const scenario = randomizedScenarios[level];
                const role = ROLES[level];
                const isCompleted = completed[level];
                const letters = ['A', 'B', 'C', 'D'];
                const [rolePart, descPart] = parseDesc(role.desc);

                let optionsHtml = '';
                scenario.options.forEach((opt, idx) => {
                    const optClass = isCompleted ? (opt.correct ? 'correct' : '') : '';
                    optionsHtml += `<div class="option-btn ${optClass}" data-opt="${idx}" data-correct="${opt.correct}" ${isCompleted ? 'style="pointer-events:none;"' : ''}>
                        <span class="option-letter">${letters[idx]}</span>
                        <span>${opt.text}</span>
                    </div>`;
                });

                mainPanel.innerHTML = `
                    <div class="scenario-container">
                        <div class="scenario-header">
                            <span class="level-badge">第 ${level+1}/${ROLES.length} 关</span>
                            <span class="level-role">· ${rolePart}</span>
                        </div>
                        <div class="redline-commitment">${descPart}</div>
                        <div class="scenario-box">
                            <div class="scenario-label">
                                <i class="fas fa-clipboard-list"></i> 实战场景
                            </div>
                            <div class="scenario-text">${scenario.question}</div>
                            <div class="options-list" id="optionsList">
                                ${optionsHtml}
                            </div>
                            ${isCompleted ? `<div class="feedback-message">${scenario.feedback}</div>` : ''}
                        </div>
                        <div class="nav-buttons">
                            <button class="nav-btn" id="prevLevelBtn">${level === 0 ? '上一页' : '← 上一关'}</button>
                            <button class="nav-btn" id="nextLevelBtn">${level === ROLES.length-1 ? '🏁 完成' : '下一关 →'}</button>
                        </div>
                    </div>
                `;

                if (!isCompleted) {
                    document.querySelectorAll('.option-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            if (completed[level]) return;
                            const isCorrect = btn.dataset.correct === 'true';
                            document.querySelectorAll('.option-btn').forEach(opt => opt.classList.remove('correct', 'wrong'));
                            if (isCorrect) {
                                btn.classList.add('correct');
                                completed[level] = true;
                                currentScore += 10;
                                currentScoreSpan.textContent = currentScore;
                                levelWrongCount[level] = 0; // 答对后重置错误计数

                                if (completed.every(v => v)) {
                                    renderMainPanel(); // 全部完成，进入成功界面
                                } else {
                                    renderLevel(level);
                                }
                            } else {
                                btn.classList.add('wrong');
                                // 高亮正确答案
                                document.querySelectorAll('.option-btn').forEach(opt => {
                                    if (opt.dataset.correct === 'true') opt.classList.add('correct');
                                });
                                // 记录错误次数
                                levelWrongCount[level]++;
                                if (levelWrongCount[level] >= 2) {
                                    // 两次机会用尽，游戏失败
                                    alert('两次机会都用完，闯关失败！');
                                    gameActive = false;
                                    renderMainPanel(); // 返回首页
                                } else {
                                    // 禁用选项，但允许用户通过下一关或上一关继续
                                    document.querySelectorAll('.option-btn').forEach(opt => opt.style.pointerEvents = 'none');
                                }
                            }
                        });
                    });
                }

                document.getElementById('prevLevelBtn')?.addEventListener('click', () => {
                    if (level === 0) {
                        gameActive = false;
                        renderMainPanel();
                    } else {
                        currentLevel--;
                        renderMainPanel();
                    }
                });

                document.getElementById('nextLevelBtn')?.addEventListener('click', () => {
                    if (currentLevel < ROLES.length - 1) {
                        currentLevel++;
                        renderMainPanel();
                    } else {
                        // 最后一关点击完成
                        if (completed.every(v => v)) {
                            renderMainPanel(); // 全部完成，进入成功界面
                        } else {
                            // 未全部完成，显示得分并返回首页
                            alert(`你的得分是${currentScore}分，请再来一次吧。`);
                            gameActive = false;
                            renderMainPanel();
                        }
                    }
                });
            }

            // ---------- 核心上传函数（使用 fetch，不依赖 supabaseClient）----------
            async function uploadSuccessRecord(department, name, yami, duration) {
                try {
                    const response = await fetch('https://sbvqbvgpmjcfarclfaxj.supabase.co/rest/v1/guardians', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
                        },
                        body: JSON.stringify({
                            department: department,
                            name: name,
                            yami: yami,
                            duration: duration,
                            created_at: new Date().toISOString()
                        })
                    });
                    if (response.status === 201) {
                        console.log('✅ 成功界面直接上传成功');
                        return true;
                    } else {
                        console.error('❌ 上传失败，状态码：', response.status);
                        return false;
                    }
                } catch (e) {
                    console.error('❌ 上传网络错误：', e);
                    return false;
                }
            }

            // 成功界面
            async function renderSuccessScreen() {
                const name = playerNameInput.value.trim() || "质量官";
                const dept = departmentInput.value.trim();
                const yami = yamiInput.value.trim();
                const duration = Math.floor((Date.now() - startTime) / 1000);

                // 使用 fetch 上传
                if (dept && name && yami) {
                    await uploadSuccessRecord(dept, name, yami, duration);
                } else {
                    console.warn('用户信息不完整，无法上传');
                }

                // 获取排名（基于上传后的数据）
                const rank = await getCurrentRank(duration);

                mainPanel.innerHTML = `
                    <div class="success-screen">
                        <div class="slogan-top">没有质量一切为0</div>
                        <img src="https://i.ibb.co/8LQKC2XF/shield.png" class="shield-image" alt="盾牌">
                        <div class="congrats-bottom">✨ 恭喜 ${name} 闯关成功，让我们一起捍卫质量红线 ✨</div>
                        <div style="color:#FFD700; margin:16px 0;">当前排名：${rank}</div>
                        <div class="success-actions">
                            <button class="achievement-btn" id="showAchievement">🏆 我的成就</button>
                            <button class="again-btn" id="playAgain">🔄 再来一次</button>
                        </div>
                    </div>
                `;
                document.getElementById('showAchievement')?.addEventListener('click', showAchievements);
                document.getElementById('playAgain')?.addEventListener('click', () => {
                    gameActive = false;
                    resetGame();
                    renderMainPanel();
                });
            }

            async function getCurrentRank(duration) {
                if (!supabaseClient) return '--';
                try {
                    const { data, error } = await supabaseClient
                        .from('guardians')
                        .select('duration')
                        .order('duration', { ascending: true });
                    if (error) throw error;
                    const allDurations = data.map(d => d.duration);
                    let rank = 1;
                    for (let d of allDurations) {
                        if (d < duration) rank++;
                    }
                    return `第${rank}名`;
                } catch {
                    return '--';
                }
            }

            async function getAllRecords() {
                if (!supabaseClient) return [];
                const { data, error } = await supabaseClient.from('guardians').select('*').order('created_at', { ascending: false });
                return error ? [] : data;
            }

            async function getMyRecords() {
                const dept = departmentInput.value.trim();
                const name = playerNameInput.value.trim();
                const yami = yamiInput.value.trim();
                if (!dept || !name || !yami || !supabaseClient) return [];
                const { data, error } = await supabaseClient
                    .from('guardians')
                    .select('*')
                    .eq('department', dept)
                    .eq('name', name)
                    .eq('yami', yami)
                    .order('created_at', { ascending: false });
                return error ? [] : data;
            }

            // 管理员后台
            globalTitle.addEventListener('dblclick', async () => {
                adminModal.style.display = 'flex';
                recordListDiv.innerHTML = '<div class="loading-message">加载中...</div>';
                const records = await getAllRecords();
                if (records.length === 0) recordListDiv.innerHTML = '<div class="empty-message">暂无记录</div>';
                else {
                    let html = '';
                    records.forEach(r => {
                        const date = new Date(r.created_at).toLocaleString('zh-CN');
                        html += `<div class="record-item"><span class="dept-name">${r.department} ${r.name}</span><span class="score-duration">100分 ${r.duration}秒</span></div>`;
                    });
                    recordListDiv.innerHTML = html;
                }
            });
            closeModalBtn.addEventListener('click', () => adminModal.style.display = 'none');
            adminModal.addEventListener('click', (e) => { if (e.target === adminModal) adminModal.style.display = 'none'; });

            exportBtn.addEventListener('click', () => {
                const password = prompt('请输入管理员密码以导出名单：');
                if (password !== 'admin123') {
                    alert('密码错误，无权导出！');
                    return;
                }
                const items = document.querySelectorAll('#recordList .record-item');
                if (!items.length) { alert('无记录'); return; }
                let csv = '部门,姓名,得分,用时(秒),时间\n';
                items.forEach(i => {
                    const spans = i.querySelectorAll('span');
                    const deptName = spans[0].innerText.split(' ');
                    const dept = deptName[0] || '';
                    const name = deptName[1] || '';
                    const scoreDuration = spans[1].innerText;
                    const [score, duration] = scoreDuration.split('分');
                    csv += `${dept},${name},100,${duration.trim()},${new Date().toISOString()}\n`;
                });
                const blob = new Blob(['\uFEFF' + csv], {type:'text/csv'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = '质量卫士.csv';
                a.click();
            });

            async function showAchievements() {
                myModal.style.display = 'flex';
                myRecordListDiv.innerHTML = '<div class="loading-message">加载中...</div>';
                const records = await getMyRecords();
                if (records.length === 0) myRecordListDiv.innerHTML = '<div class="empty-message">暂无闯关成功记录</div>';
                else {
                    let html = '';
                    records.forEach(r => {
                        const date = new Date(r.created_at).toLocaleString('zh-CN');
                        html += `<div class="record-item"><span class="dept-name">${r.department} ${r.name}</span><span class="score-duration">100分 ${r.duration}秒</span></div>`;
                    });
                    myRecordListDiv.innerHTML = html;
                }
            }
            closeMyModalBtn.addEventListener('click', () => myModal.style.display = 'none');
            myModal.addEventListener('click', (e) => { if (e.target === myModal) myModal.style.display = 'none'; });

            startBtn.addEventListener('click', () => {
                if (startChallenge()) renderMainPanel();
            });

            rankBtn.addEventListener('click', async () => {
                adminModal.style.display = 'flex';
                recordListDiv.innerHTML = '<div class="loading-message">加载中...</div>';
                const records = await getAllRecords();
                if (records.length === 0) recordListDiv.innerHTML = '<div class="empty-message">暂无记录</div>';
                else {
                    records.sort((a, b) => (a.duration || 0) - (b.duration || 0));
                    let html = '';
                    records.forEach((r, idx) => {
                        html += `<div class="record-item"><span class="dept-name">${idx+1}. ${r.department} ${r.name}</span><span class="score-duration">100分 ${r.duration}秒</span></div>`;
                    });
                    recordListDiv.innerHTML = html;
                }
            });

            bestBtn.addEventListener('click', async () => {
                const records = await getMyRecords();
                if (records.length === 0) {
                    alert('您还没有闯关成功记录');
                } else {
                    const best = records.reduce((min, r) => (r.duration < min.duration) ? r : min, records[0]);
                    alert(`您的历史最好成绩：100分，用时 ${best.duration} 秒`);
                }
            });

            // 暴露测试函数
            window.testUpload = function() {
                const dept = departmentInput.value.trim();
                const name = playerNameInput.value.trim();
                const yami = yamiInput.value.trim();
                const duration = 120;
                if (!dept || !name || !yami) {
                    alert('请先填写部门、姓名、娅米账号');
                    return;
                }
                uploadSuccessRecord(dept, name, yami, duration).then(success => {
                    if (success) alert('测试上传成功，请刷新 Supabase 表');
                });
            };

            function init() {
                renderMainPanel();
                setInterval(updateUserRankAndBest, 10000);
            }
            init();
        })();
    </script>
