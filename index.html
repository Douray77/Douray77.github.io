<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>质量红线 · 年轻版</title>
    <!-- 引入Supabase客户端库 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 引入 Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }

        /* 引入 Google Font 增加现代感 */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ff8c5a, #ff4d6d, #9d4edd);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            position: relative;
            overflow-x: hidden;
        }

        /* 动态背景动画 */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 飘浮的装饰星星 */
        .star {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: float 6s infinite;
            z-index: 0;
        }
        .star:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .star:nth-child(2) { top: 20%; right: 8%; width: 30px; height: 30px; animation-delay: 2s; }
        .star:nth-child(3) { bottom: 15%; left: 15%; width: 15px; height: 15px; animation-delay: 4s; }
        .star:nth-child(4) { bottom: 25%; right: 20%; animation-delay: 1s; }
        .star:nth-child(5) { top: 40%; left: 30%; width: 25px; height: 25px; animation-delay: 3s; }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 0.7; }
            100% { transform: translateY(0) rotate(360deg); opacity: 0.3; }
        }

        .game-container {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px 50px 40px 40px;
            padding: 20px 16px 28px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.2) inset;
            position: relative;
            z-index: 10;
        }

        .global-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 3px 3px 0 #ff4d6d, 5px 5px 0 rgba(0,0,0,0.2);
            letter-spacing: 2px;
            margin-bottom: 16px;
            word-break: keep-all;
            line-height: 1.2;
            cursor: pointer;
            user-select: none;
            animation: titleGlow 2s infinite alternate;
        }

        @keyframes titleGlow {
            from { text-shadow: 3px 3px 0 #ff4d6d, 5px 5px 0 rgba(0,0,0,0.2); }
            to { text-shadow: 5px 5px 0 #9d4edd, 8px 8px 0 rgba(0,0,0,0.3); }
        }

        /* 部门 + 姓名输入区（替换为 Font Awesome 图标） */
        .info-section {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 18px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }
        .input-row:last-child {
            margin-bottom: 0;
        }
        .input-icon {
            min-width: 40px;
            text-align: center;
        }
        .input-icon i {
            font-size: 2rem;
            color: #ffd966;
            filter: drop-shadow(0 2px 4px gold);
        }
        .input-field {
            flex: 1;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            border-radius: 50px;
            padding: 12px 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }
        .input-field:focus-within {
            border-color: #ffd966;
            box-shadow: 0 0 0 4px rgba(255, 217, 102, 0.3);
            background: rgba(255, 255, 255, 0.5);
        }
        .input-field input {
            width: 100%;
            background: transparent;
            border: none;
            font-size: 1.1rem;
            font-weight: 500;
            color: #2c0a0a;
            outline: none;
        }
        .input-field input::placeholder {
            color: #5a3e3e;
            font-weight: 400;
            font-style: italic;
        }

        .main-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 24px 16px 28px;
            box-shadow: 0 20px 30px -5px black, 0 0 0 1px rgba(255, 255, 255, 0.3) inset;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-top: 8px;
            min-height: 340px;
            transition: all 0.3s;
        }

        .game-title-main {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            color: #ffffff;
            text-shadow: 2px 2px 0 #ff4d6d, 4px 4px 0 rgba(0,0,0,0.2);
            margin-bottom: 20px;
            letter-spacing: 1px;
            line-height: 1.4;
        }

        .welcome-message {
            text-align: center;
            padding: 20px 8px 24px;
            color: #fff6e0;
            font-size: 1.3rem;
            font-weight: 500;
            background: rgba(0,0,0,0.1);
            border-radius: 50px;
        }
        .welcome-message p {
            font-size: 1.1rem;
            color: #fff0c0;
            margin-top: 20px;
            font-weight: 400;
        }

        .progress-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 4px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .badge {
            background: #ff4d6d;
            color: #fff9e6;
            font-weight: 700;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1rem;
            box-shadow: 0 5px 0 #b22222, 0 8px 15px black;
            letter-spacing: 0.5px;
            border: 1px solid #ffbb33;
            white-space: nowrap;
        }
        .info-text {
            color: #ffefc0;
            font-weight: 600;
            font-size: 1rem;
            background: rgba(0,0,0,0.3);
            padding: 6px 14px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }
        .chance-indicator {
            background: #ffb347;
            color: #3a1f00;
            font-weight: 800;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.95rem;
            box-shadow: 0 4px 0 #b26b00;
            border: 1px solid #ffd966;
            white-space: nowrap;
        }

        .question-desc {
            background: linear-gradient(145deg, #ff6b6b, #c44569);
            padding: 24px 16px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff9e6;
            box-shadow: 0 12px 0 #8b1e1e, 0 18px 30px black;
            margin-bottom: 30px;
            border: 2px solid #ffb347;
            text-align: center;
            line-height: 1.5;
            text-shadow: 0 2px 0 #5a1e1e;
            word-break: break-word;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .role-btn {
            background: rgba(255, 255, 255, 0.25);
            border: none;
            border-radius: 50px;
            padding: 16px 8px;
            font-size: 1rem;
            font-weight: 600;
            color: #2c0a0a;
            box-shadow: 0 7px 0 rgba(0,0,0,0.2), 0 8px 18px black;
            cursor: pointer;
            transition: all 0.1s ease, transform 0.2s;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.5);
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
        }
        .role-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.02);
            border-color: #ffd966;
            color: #000;
        }
        .role-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2), 0 5px 12px black;
        }

        .action-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .primary-btn, .secondary-btn {
            border: none;
            font-weight: 700;
            padding: 14px 24px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.1rem;
            letter-spacing: 1px;
            white-space: nowrap;
            border: 2px solid rgba(255,255,255,0.6);
            box-shadow: 0 8px 0 rgba(0,0,0,0.2), 0 10px 20px black;
        }
        .primary-btn {
            background: linear-gradient(145deg, #ff6b4a, #ff3b3f);
            color: #fff9e6;
        }
        .primary-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }
        .primary-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 rgba(0,0,0,0.2), 0 8px 15px black;
        }
        .secondary-btn {
            background: rgba(255, 255, 255, 0.3);
            color: #fff;
            backdrop-filter: blur(4px);
        }
        .secondary-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            color: #000;
        }
        .my-achievement-btn {
            background: #ffb347;
            box-shadow: 0 8px 0 #b26b00;
            color: #2c0a0a;
        }

        /* 成功画面 */
        .success-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 0 10px;
            animation: popIn 0.5s ease;
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
        .slogan-top {
            font-size: clamp(2rem, 8vw, 3.2rem);
            font-weight: 900;
            color: #ffefc0;
            text-align: center;
            line-height: 1.2;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0 #ff4d6d, 5px 5px 0 rgba(0,0,0,0.3);
        }
        .shield-image {
            width: 140px;
            height: auto;
            margin: 20px 0;
            filter: drop-shadow(0 0 20px gold);
            animation: spinGlow 3s infinite alternate;
        }
        @keyframes spinGlow {
            from { filter: drop-shadow(0 0 10px gold); transform: rotate(0deg); }
            to { filter: drop-shadow(0 0 30px #ffb347); transform: rotate(5deg); }
        }
        .congrats-bottom {
            color: #fff6e0;
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            font-weight: 600;
            background: rgba(255, 180, 70, 0.5);
            backdrop-filter: blur(10px);
            padding: 14px 24px;
            border-radius: 60px;
            border: 2px solid #ffd966;
            margin-top: 20px;
            text-align: center;
            line-height: 1.4;
            box-shadow: 0 8px 0 #b26b00;
        }

        .error-message {
            background: #c44569dd;
            color: #ffe6e6;
            padding: 18px;
            border-radius: 50px;
            text-align: center;
            font-weight: 700;
            font-size: 1.2rem;
            backdrop-filter: blur(10px);
            border: 2px solid #ff8888;
            box-shadow: 0 6px 0 #8b1e1e;
        }

        /* 模态框共用样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 16px;
        }
        .modal-content {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 24px 20px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px black;
        }
        .modal-content h2 {
            color: #ffefc0;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2rem;
            text-shadow: 2px 2px 0 #ff4d6d;
        }
        .record-list {
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            padding: 12px;
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        .record-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff6e0;
            font-size: 1rem;
        }
        .record-item:last-child {
            border-bottom: none;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .modal-btn {
            background: #ff6b4a;
            border: none;
            color: #fff9e6;
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #b22222;
            transition: 0.1s;
            border: 1px solid #f9d27e;
            font-size: 1rem;
        }
        .modal-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #b22222;
        }
        .close-btn {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 6px 0 #3a4c5c;
        }
        .empty-message {
            color: #aaa;
            text-align: center;
            padding: 20px;
            font-style: italic;
        }
        .loading-message {
            color: #ffd966;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <!-- 飘浮装饰星星 -->
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>

    <div class="game-container" id="gameContainer">
        <div class="global-title" id="globalTitle">人人都是质量官</div>

        <!-- 部门 + 姓名输入区（使用 Font Awesome 图标） -->
        <div class="info-section" id="infoSection">
            <div class="input-row">
                <span class="input-icon"><i class="fas fa-building"></i></span>
                <div class="input-field">
                    <input type="text" id="departmentInput" placeholder="部门" value="" maxlength="50">
                </div>
            </div>
            <div class="input-row">
                <span class="input-icon"><i class="fas fa-user"></i></span>
                <div class="input-field">
                    <input type="text" id="playerName" placeholder="姓名" value="" maxlength="20">
                </div>
            </div>
        </div>

        <!-- 主面板：动态渲染 -->
        <div class="main-panel" id="mainPanel"></div>

        <!-- 底部操作按钮 -->
        <div class="action-bar">
            <button class="primary-btn" id="startGameBtn">▶ 开始闯关</button>
            <button class="secondary-btn my-achievement-btn" id="myAchievementBtn">🏆 我的成就</button>
            <button class="secondary-btn reset-btn" id="resetGameBtn">⟲ 新的一局</button>
        </div>
    </div>

    <!-- 管理员模态框（所有人记录） -->
    <div id="adminModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>📋 质量卫士总榜</h2>
            <div id="recordList" class="record-list">
                <div class="loading-message">加载中...</div>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn" id="exportCSV">📥 导出CSV</button>
                <button class="modal-btn close-btn" id="closeModal">🔙 关闭</button>
            </div>
        </div>
    </div>

    <!-- 个人成就模态框 -->
    <div id="myAchievementModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>🏅 我的成就</h2>
            <div id="myRecordList" class="record-list">
                <div class="loading-message">加载中...</div>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn close-btn" id="closeMyModal">🔙 关闭</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 配置Supabase ----------
            const SUPABASE_URL = 'https://sbvqbvgpmjcfarclfaxj.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_ZKlqQaFMhNEE0uRWZOd-Kw_1zIza0HF';
            
            // 初始化Supabase客户端
            let supabaseClient = null;
            try {
                if (typeof supabase === 'undefined' || !supabase) {
                    throw new Error('Supabase library not loaded properly');
                }
                const { createClient } = supabase;
                supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('✅ Supabase初始化成功', supabaseClient);
            } catch (e) {
                console.error('❌ Supabase初始化失败', e);
                supabaseClient = null;
            }

            // 注意：需要在Supabase的guardians表中增加department列，执行SQL：
            // ALTER TABLE guardians ADD COLUMN department text;

            // ---------- 质量红线十条数据 ----------
            const QUESTIONS = [
                { role: "物料的验收员", desc: "我承诺，只接收合格、有明确来源的物料，把好品质的源头关。" },
                { role: "现场的配料员", desc: "我坚持，严格按标准配方操作，确保每一次投料都准确无误。" },
                { role: "质量的守护员", desc: "我确保，任何不合格品都会被清晰标识、妥善处理，未经批准绝不流转。" },
                { role: "工艺的操作员", desc: "我承诺，遵守每一项工艺规定，不私自调整任何参数，保证操作的一致性。" },
                { role: "关键控制点的负责人", desc: "我重视，每个关键限值的要求，确保每一个关键参数的严格执行。" },
                { role: "食品接触面的选择者", desc: "我坚持，只使用符合安全标准的材料，直接接触食品的表面必须安全可靠。" },
                { role: "生产记录的填写者", desc: "我做到，及时、真实、完整地记录生产数据，让每一笔记录都经得起检验。" },
                { role: "质量异常的发现者", desc: "我承诺，发现问题第一时间上报，不隐瞒、不拖延，共同面对解决。" },
                { role: "设备的使用者", desc: "我坚持，不使用带病或未经确认的设备，做好日常点检，让生产更稳定。" },
                { role: "变更的执行者", desc: "我确保，任何工艺或设备的改变，都先经过评估和审批，保证风险可控。" }
            ];

            // ---------- 状态 ----------
            let gameActive = false;               
            let gameSuccess = false;               
            let currentQuestions = [];             
            let currentIndex = 0;                   
            let attemptCount = 0;                   

            let userDepartment = "";
            let userName = "";

            // DOM
            const departmentInput = document.getElementById('departmentInput');
            const playerNameInput = document.getElementById('playerName');
            const mainPanel = document.getElementById('mainPanel');
            const startBtn = document.getElementById('startGameBtn');
            const resetBtn = document.getElementById('resetGameBtn');
            const myAchievementBtn = document.getElementById('myAchievementBtn');
            const infoSection = document.getElementById('infoSection');
            const globalTitle = document.getElementById('globalTitle');

            // 管理员模态框
            const adminModal = document.getElementById('adminModal');
            const recordListDiv = document.getElementById('recordList');
            const exportBtn = document.getElementById('exportCSV');
            const closeModalBtn = document.getElementById('closeModal');

            // 个人成就模态框
            const myModal = document.getElementById('myAchievementModal');
            const myRecordListDiv = document.getElementById('myRecordList');
            const closeMyModalBtn = document.getElementById('closeMyModal');

            // ---------- 云数据库操作 ----------
            async function addRecordToCloud(department, name) {
                console.log('🚀 addRecordToCloud 被调用', { department, name });
                if (!department || !name || !supabaseClient) {
                    console.warn('❌ addRecordToCloud 跳过：参数不完整或supabaseClient无效');
                    return;
                }
                try {
                    const { data, error } = await supabaseClient
                        .from('guardians')
                        .insert([{ 
                            department: department,
                            name: name,
                            created_at: new Date().toISOString()
                        }]);
                    
                    if (error) {
                        console.error('❌ Supabase插入失败:', error);
                        if (error.message && error.message.includes('column "department" does not exist')) {
                            alert('数据库缺少 department 列，请在Supabase SQL中执行：ALTER TABLE guardians ADD COLUMN department text;');
                        }
                    } else {
                        console.log('✅ 记录成功上传至云端', data);
                    }
                } catch (e) {
                    console.error('❌ 网络错误:', e);
                }
            }

            // 从Supabase获取所有记录（管理员）
            async function getAllRecords() {
                if (!supabaseClient) return [];
                try {
                    const { data, error } = await supabaseClient
                        .from('guardians')
                        .select('*')
                        .order('created_at', { ascending: false });
                    if (error) {
                        console.error('查询失败:', error);
                        return [];
                    }
                    return data || [];
                } catch (e) {
                    console.error('网络错误:', e);
                    return [];
                }
            }

            // 获取当前用户的记录（部门+姓名匹配）
            async function getMyRecords() {
                const department = departmentInput.value.trim();
                const name = playerNameInput.value.trim();
                if (!department || !name) {
                    return [];
                }
                if (!supabaseClient) return [];
                try {
                    const { data, error } = await supabaseClient
                        .from('guardians')
                        .select('*')
                        .eq('department', department)
                        .eq('name', name)
                        .order('created_at', { ascending: false });
                    if (error) {
                        console.error('查询个人记录失败:', error);
                        return [];
                    }
                    return data || [];
                } catch (e) {
                    console.error('网络错误:', e);
                    return [];
                }
            }

            // 暴露到全局方便调试
            window.addRecordToCloud = addRecordToCloud;

            // ---------- 辅助函数 ----------
            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            function getAllRoles() {
                return QUESTIONS.map(q => q.role);
            }

            // 控制信息区域显示/隐藏（仅在欢迎界面显示）
            function setInfoVisible(visible) {
                infoSection.style.display = visible ? 'block' : 'none';
            }

            function renderMainPanel() {
                if (gameSuccess) {
                    setInfoVisible(false);
                    renderSuccessScreen();
                } else if (gameActive && currentQuestions.length > 0 && currentIndex < currentQuestions.length) {
                    setInfoVisible(false);
                    renderGameScreen();
                } else {
                    setInfoVisible(true);
                    renderWelcomeScreen();
                }
            }

            function renderWelcomeScreen() {
                mainPanel.innerHTML = `
                    <div class="welcome-message">
                        <div class="game-title-main">《质量红线十条》<br>学习闯关小游戏</div>
                        ⚜️ 请先填写部门及姓名 ⚜️
                        <p>🔴 每道题有两次机会，答对进入下一关，两次错误则闯关失败</p>
                    </div>
                `;
            }

            function renderGameScreen() {
                if (!gameActive || currentIndex >= currentQuestions.length) return;

                const q = currentQuestions[currentIndex];
                const allRoles = getAllRoles();
                const shuffledOptions = shuffleArray([...allRoles]);

                let optionsHtml = '';
                shuffledOptions.forEach(roleName => {
                    optionsHtml += `<button class="role-btn" data-role="${roleName}">${roleName}</button>`;
                });

                const chancesLeft = 2 - attemptCount;
                const chanceText = chancesLeft > 0 ? `剩余机会: ${chancesLeft} 次` : `最后一次机会`;

                const progress = `
                    <div class="progress-row">
                        <span class="badge">第 ${currentIndex+1} / 10 关</span>
                        <span class="chance-indicator">⚡ ${chanceText}</span>
                        <span class="info-text">🔥 质量红线</span>
                    </div>
                `;
                const descHtml = `<div class="question-desc">“我是（　　）：${q.desc}”</div>`;
                const gridHtml = `<div class="options-grid" id="optionsGrid">${optionsHtml}</div>`;

                mainPanel.innerHTML = progress + descHtml + gridHtml;

                document.querySelectorAll('.role-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        if (!gameActive) return;
                        const selectedRole = e.target.getAttribute('data-role');
                        const correctRole = currentQuestions[currentIndex].role;
                        if (selectedRole === correctRole) {
                            attemptCount = 0;
                            handleCorrectAnswer();
                        } else {
                            attemptCount++;
                            if (attemptCount >= 2) {
                                gameActive = false;
                                mainPanel.innerHTML = `<div class="error-message">❌ 两次机会都用完… 闯关失败，请重新开始</div>`;
                                setTimeout(() => {
                                    renderMainPanel();
                                }, 1500);
                            } else {
                                renderGameScreen();
                            }
                        }
                    });
                });
            }

            function handleCorrectAnswer() {
                if (!gameActive) return;
                if (currentIndex + 1 >= currentQuestions.length) {
                    gameActive = false;
                    gameSuccess = true;
                    // 成功闯关，记录部门+姓名到云端
                    const department = departmentInput.value.trim();
                    const name = playerNameInput.value.trim();
                    if (department && name) {
                        addRecordToCloud(department, name);
                    }
                    renderMainPanel();
                } else {
                    currentIndex++;
                    renderMainPanel();
                }
            }

            function renderSuccessScreen() {
                const name = playerNameInput.value.trim() || "质量官";
                mainPanel.innerHTML = `
                    <div class="success-screen">
                        <div class="slogan-top">没有质量一切为0</div>
                        <img src="https://i.ibb.co/8LQKC2XF/shield.png" alt="质量卫士盾牌" class="shield-image" style="width:140px;height:auto;">
                        <div class="congrats-bottom">✨ 恭喜 ${name} 闯关成功，让我们一起捍卫质量红线 ✨</div>
                    </div>
                `;
            }

            function startNewAttempt() {
                const department = departmentInput.value.trim();
                const name = playerNameInput.value.trim();
                if (department === '') {
                    alert('请填写部门');
                    return;
                }
                if (name === '') {
                    alert('请填写姓名');
                    return;
                }
                userDepartment = department;
                userName = name;

                gameActive = true;
                gameSuccess = false;
                currentQuestions = shuffleArray([...QUESTIONS]);
                currentIndex = 0;
                attemptCount = 0;
                renderMainPanel();
            }

            function resetGame() {
                gameActive = false;
                gameSuccess = false;
                currentQuestions = [];
                currentIndex = 0;
                attemptCount = 0;
                renderMainPanel();
            }

            // ---------- 管理功能（管理员） ----------
            globalTitle.addEventListener('dblclick', function() {
                openAdminModal();
            });

            async function openAdminModal() {
                adminModal.style.display = 'flex';
                recordListDiv.innerHTML = '<div class="loading-message">加载中...</div>';
                const records = await getAllRecords();
                if (records.length === 0) {
                    recordListDiv.innerHTML = '<div class="empty-message">暂无成功记录</div>';
                } else {
                    let html = '';
                    records.forEach(rec => {
                        const time = new Date(rec.created_at).toLocaleString('zh-CN', { hour12: false });
                        html += `<div class="record-item"><span>${rec.department || ''} ${rec.name}</span><span>${time}</span></div>`;
                    });
                    recordListDiv.innerHTML = html;
                }
            }

            function closeAdminModal() {
                adminModal.style.display = 'none';
            }

            function exportToCSV() {
                const items = document.querySelectorAll('#recordList .record-item');
                if (items.length === 0) {
                    alert('没有记录可导出');
                    return;
                }
                let csv = '部门,姓名,闯关成功时间\n';
                items.forEach(item => {
                    const text = item.querySelector('span:first-child').innerText;
                    const time = item.querySelector('span:last-child').innerText;
                    // 分割部门和姓名（以空格分隔）
                    const parts = text.split(' ');
                    const department = parts[0] || '';
                    const name = parts[1] || text;
                    csv += `${department},${name},${time}\n`;
                });
                const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.href = url;
                link.setAttribute('download', '质量卫士名单.csv');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }

            exportBtn.addEventListener('click', exportToCSV);
            closeModalBtn.addEventListener('click', closeAdminModal);
            adminModal.addEventListener('click', function(e) {
                if (e.target === adminModal) closeAdminModal();
            });

            // ---------- 个人成就功能 ----------
            myAchievementBtn.addEventListener('click', async function() {
                const department = departmentInput.value.trim();
                const name = playerNameInput.value.trim();
                if (!department || !name) {
                    alert('请先填写部门及姓名');
                    return;
                }
                myModal.style.display = 'flex';
                myRecordListDiv.innerHTML = '<div class="loading-message">加载中...</div>';
                const records = await getMyRecords();
                if (records.length === 0) {
                    myRecordListDiv.innerHTML = '<div class="empty-message">您还没有闯关成功记录</div>';
                } else {
                    let html = '';
                    records.forEach(rec => {
                        const time = new Date(rec.created_at).toLocaleString('zh-CN', { hour12: false });
                        html += `<div class="record-item"><span>${rec.department} ${rec.name}</span><span>${time}</span></div>`;
                    });
                    myRecordListDiv.innerHTML = html;
                }
            });

            closeMyModalBtn.addEventListener('click', function() {
                myModal.style.display = 'none';
            });
            myModal.addEventListener('click', function(e) {
                if (e.target === myModal) myModal.style.display = 'none';
            });

            // 按钮事件
            startBtn.addEventListener('click', startNewAttempt);
            resetBtn.addEventListener('click', resetGame);

            function init() {
                renderMainPanel();
                // 清空输入框（可选）
                departmentInput.value = '';
                playerNameInput.value = '';
            }

            init();
        })();
    </script>
</body>
</html>
